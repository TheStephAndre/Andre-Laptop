<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="stylesheet" href="style.css" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;700&family=Work+Sans:wght@400;700&display=swap" rel="stylesheet" />
    
    <title>Andre's Laptop | Next-Gen Display</title>
  </head>

  <body>
    <nav class="navbar">
      <div class="container navbar-container">
        <div class="nav-logo">
          <img src="./img/logo.svg" alt="Andre Media Logo" />
          <h1>Andre Media</h1>
        </div>

        <ul class="nav-list">
          <li class="nav-item"><a class="nav-link" href="#">Specs</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>

        <div class="hamburger-menu">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>

        <div class="nav-cart">
          <img src="./img/cart.svg" alt="Shopping Cart" />
        </div>
      </div>
    </nav>

    <section class="main-container">
      <div class="main-text">
        <h1>Laptop of the millennium</h1>
        <p>The new 14-inch frameless display offers a stunning 4K touchscreen experience.</p>
        
        <div class="call-to-action">
          <button class="btn-select">14 inch</button>
          <button class="btn-cart">Add To Cart</button>
        </div>
      </div>

      <div class="main-image">
        <div class="main-image-container">
          <img src="./img/matebook.png" alt="Sleek laptop showcasing 4K display" />
          
          <div class="slide-icon">
            <img src="./img/arrow-left.svg" alt="Previous slide" />
            <img src="./img/dot.svg" alt="Slide 1" />
            <img src="./img/dot-full.svg" alt="Slide 2" />
            <img src="./img/dot-full.svg" alt="Slide 3" />
            <img src="./img/arrow-right.svg" alt="Next slide" />
          </div>
        </div>
      </div>
    </section>

    <footer>
      <div class="footer-container">
        <p class="footer-text">
          Copyright &copy; 2026 Andre Media. All rights reserved.
        </p>
      </div>
    </footer>

    <script>
      const hamburgerMenu = document.querySelector(".hamburger-menu");
      const navList = document.querySelector(".nav-list");
      const navLinks = document.querySelectorAll(".nav-link");

      // Function to toggle mobile menu open/closed
      const toggleMobileMenu = () => {
        hamburgerMenu.classList.toggle("active");
        navList.classList.toggle("active");
      };

      hamburgerMenu.addEventListener("click", toggleMobileMenu);

      // Close the menu automatically when a link is clicked (Improved UX)
      navLinks.forEach((link) => {
        link.addEventListener("click", () => {
          hamburgerMenu.classList.remove("active");
          navList.classList.remove("active");
        });
      });
    </script>
  </body>
</html>
